<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Run Tracker</title>
    <style>
      * { box-sizing: border-box; }
      html, body, #root { margin: 0; height: 100%; }
      body {
        font: 14px/1.45 system-ui, -apple-system, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      .app { display: flex; height: 100%; }
      .sidebar {
        width: 280px;
        flex: none;
        padding: 16px;
        overflow-y: auto;
        background: #0f172a;
        border-right: 1px solid #1e293b;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .sidebar h1 { font-size: 17px; margin: 0; }
      .map { flex: 1; position: relative; }

      .modes { display: flex; gap: 6px; }
      .mode, .chip, .sync-btn, .playback button {
        background: #1e293b;
        color: #cbd5e1;
        border: 1px solid #334155;
        border-radius: 6px;
        padding: 5px 10px;
        cursor: pointer;
        font-size: 12px;
      }
      .mode.on, .chip.on { background: #34d399; border-color: #34d399; color: #052e16; }
      .mode { flex: 1; }

      .panel, .field { display: flex; flex-direction: column; gap: 6px; }
      .panel { gap: 14px; }
      .field > span { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: #64748b; }
      .chips { display: flex; flex-wrap: wrap; gap: 5px; }
      .chip { padding: 3px 8px; }

      .check { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #cbd5e1; }
      .check input { accent-color: #34d399; }
      textarea {
        background: #1e293b;
        color: #e2e8f0;
        border: 1px solid #334155;
        border-radius: 6px;
        padding: 5px 8px;
        font-size: 12px;
        font-family: ui-monospace, monospace;
        width: 100%;
        resize: vertical;
      }
      select, input[type="number"] {
        background: #1e293b;
        color: #e2e8f0;
        border: 1px solid #334155;
        border-radius: 6px;
        padding: 5px 8px;
        font-size: 13px;
        width: 100%;
      }
      .range { display: flex; align-items: center; gap: 6px; }
      .playback { display: flex; align-items: center; gap: 8px; }
      .playback input[type="range"] { flex: 1; accent-color: #34d399; }
      .dim { color: #64748b; font-size: 12px; white-space: nowrap; }

      .sync { display: flex; flex-direction: column; gap: 4px; }
      .sync-note { margin: 0; font-size: 11px; color: #64748b; word-break: break-word; }
      .sync-note.err { color: #f87171; }
      .status { margin: 0; font-size: 12px; color: #64748b; }

      /* dashboard */
      .dashboard {
        height: 100%;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        max-width: 760px;
      }
      .dash-row { display: flex; gap: 16px; flex-wrap: wrap; }
      .goal-card, .settings, .chart {
        background: #131c31;
        border: 1px solid #1e293b;
        border-radius: 10px;
        padding: 14px 16px;
      }
      .goal-card { flex: 2; min-width: 260px; }
      .settings { flex: 1; min-width: 200px; display: flex; flex-direction: column; gap: 8px; }
      .settings h3, .chart h3 { margin: 0 0 8px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: #94a3b8; font-weight: 600; }
      .goal-head { display: flex; justify-content: space-between; align-items: center; }
      .goal-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: #94a3b8; font-weight: 600; }
      .goal-big { margin: 8px 0; font-size: 34px; font-weight: 700; line-height: 1; }
      .goal-unit { font-size: 15px; font-weight: 400; color: #94a3b8; }
      .goal-detail { margin: 6px 0 0; font-size: 12px; color: #94a3b8; }
      .badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; border: 1px solid; }
      .badge.ok { color: #4ade80; border-color: #4ade80; }
      .badge.behind { color: #f87171; border-color: #f87171; }
      .meter { position: relative; height: 8px; background: #1e293b; border-radius: 4px; margin-top: 10px; }
      .meter-fill { height: 100%; background: #199e70; border-radius: 4px; }
      .meter-mark { position: absolute; top: -3px; width: 2px; height: 14px; background: #94a3b8; }

      .chart-body { position: relative; }
      .chart svg { width: 100%; height: auto; display: block; }
      .tooltip {
        position: absolute;
        top: 4px;
        right: 4px;
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 6px;
        padding: 4px 8px;
        font-size: 11px;
        color: #e2e8f0;
        pointer-events: none;
        white-space: nowrap;
      }
      .legend { display: flex; gap: 14px; margin-top: 6px; font-size: 11px; color: #94a3b8; }
      .legend .swatch { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 4px; vertical-align: -1px; }
      .empty { color: #64748b; font-size: 13px; }

      .data-table summary { cursor: pointer; font-size: 12px; color: #94a3b8; }
      .data-table table { border-collapse: collapse; margin-top: 10px; font-size: 12px; width: 100%; max-width: 420px; }
      .data-table th, .data-table td { text-align: left; padding: 3px 10px 3px 0; border-bottom: 1px solid #1e293b; color: #cbd5e1; }
      .data-table th { color: #64748b; font-weight: 500; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
